<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .download-button {
            background-color: white;
            color: black;
            padding: 15px 30px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="apk.upsilon.zip" 
       id="downloadBtn"
       type="application/octet-stream" 
       class="download-button" 
       download="apk.upsilon.zip">
       apk.upsilon.zip
    </a>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function(event) {
            // Affiche la boîte de confirmation
            var confirmation = confirm("Are you sure you want to download apk.upsilon.zip?");
            
            // Si l'utilisateur clique sur "Annuler", on bloque le téléchargement
            if (!confirmation) {
                event.preventDefault();
            }
        });
    </script>

</body>
</html>
